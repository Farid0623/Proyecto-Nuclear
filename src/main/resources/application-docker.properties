spring.profiles.active=docker

# MongoDB - Variables de entorno
spring.data.mongodb.host=${SPRING_DATA_MONGODB_HOST:mongodb}
spring.data.mongodb.port=${SPRING_DATA_MONGODB_PORT:27017}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:modulo_asignaturas}
spring.data.mongodb.username=${SPRING_DATA_MONGODB_USERNAME:admin}
spring.data.mongodb.password=${SPRING_DATA_MONGODB_PASSWORD:admin123}
spring.data.mongodb.authentication-database=${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE:admin}

# JWT
app.jwtSecret=${APP_JWT_SECRET:myDockerSecretKey123456789012345678901234567890abcdefghijklmnop}
app.jwtExpirationMs=${APP_JWT_EXPIRATION_MS:86400000}

# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# Logging
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
logging.level.co.edu.cue.moduloasignaturas=${LOGGING_LEVEL_CO_EDU_CUE_MODULOASIGNATURAS:INFO}
logging.level.org.springframework.data.mongodb=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_DATA_MONGODB:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ConfiguraciÃ³n de salud y mÃ©tricas
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mongo.enabled=true