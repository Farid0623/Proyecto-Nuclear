
# ===================================================================
# SOLUCIėN 1: application.properties - Actualizar JWT Secret
# ===================================================================

# CORS
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=modulo_asignaturas

# JWT - CLAVE SEGURA DE 256 BITS (32+ caracteres)
app.jwtSecret=mySecretKey12345678901234567890123456789012345678901234567890
app.jwtExpirationMs=86400000

# Server
server.port=8080

# API
spring.data.rest.base-path=/api

# Logging
logging.level.co.edu.cue.moduloasignaturas=DEBUG
logging.level.org.springframework.security=DEBUG